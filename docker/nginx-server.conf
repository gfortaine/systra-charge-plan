upstream app_server {
    # fail_timeout=0 means we always retry an upstream even if it failed to return a good HTTP response
    server unix:/var/run/gunicorn.sock fail_timeout=0;
}
map $http_x_forwarded_proto $proxy_x_forwarded_proto { # http or https
    default $http_x_forwarded_proto;
    '' $scheme;
}
map $proxy_x_forwarded_proto $proxy_x_forwarded_ssl { # on or off
    default off;
    https on;
}
map $http_x_forwarded_host $proxy_x_forwarded_host {
    default $http_x_forwarded_host;
    '' $http_host;
}
map $http_x_forwarded_port $proxy_x_forwarded_port {
    default $http_x_forwarded_port;
    '' $server_port;
}
server {
    listen 80;
    location ~ /(static|media)/ {
        root /var/www/myapp/back/;
    }
    location ~ /assets/ {
        root /var/www/myapp/back/static/;
    }
    location /favicon.ico {
        alias /var/www/myapp/back/favicon.ico;
    }
    location / {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $proxy_x_forwarded_host;
        proxy_set_header X-Forwarded-Port $proxy_x_forwarded_port;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_set_header X-Forwarded-Ssl $proxy_x_forwarded_ssl;
        proxy_redirect off;
        proxy_pass http://app_server;
    }
}
