"""ChargePlanLine(id, person, project, planned_hours)"""
type ChargePlanLine {
  id: ID!
  person: Person!
  project: Project!
  plannedHours: Decimal!
  amount: Decimal!
}

input ChargePlanLineInput {
  personId: ID!
  projectId: ID!
  plannedHours: Decimal!
}

"""Decimal (fixed-point)"""
scalar Decimal

type Mutation {
  saveChargePlan(lines: [ChargePlanLineInput!]!): [ChargePlanLine!]!
}

input OffsetPaginationInput {
  offset: Int! = 0
  limit: Int
}

"""Charge-plan person reference"""
type Person {
  id: ID!
  fullName: String!
}

"""Project(id, name)"""
type Project {
  id: ID!
  name: String!
}

type Query {
  version: String!
  allPeople(pagination: OffsetPaginationInput): [Person!]!
  allProjects(pagination: OffsetPaginationInput): [Project!]!
  allChargePlanLines(pagination: OffsetPaginationInput): [ChargePlanLine!]!
}
