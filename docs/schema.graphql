directive @oneOf on INPUT_OBJECT

"""Category(id, name)"""
type Category {
  id: ID!
  name: String!
  posts(filters: PostFilter, ordering: [PostOrder!]! = [], pagination: OffsetPaginationInput): [Post!]!
}

"""Category(id, name)"""
input CategoryCreateInput {
  name: String!
}

"""Category(id, name)"""
input CategoryFilter {
  name: StrFilterLookup
  AND: CategoryFilter
  OR: CategoryFilter
  NOT: CategoryFilter
  DISTINCT: Boolean
}

input CategoryOrder @oneOf {
  name: Ordering
}

"""Category(id, name)"""
input CategoryUpdateInput {
  name: String
}

"""Comment(id, post, text, date, author)"""
type Comment {
  id: ID!
  post: Post!
  text: String!
  date: DateTime!
  author: User!
}

"""Comment(id, post, text, date, author)"""
input CommentCreateInput {
  postId: ID!
  text: String!
  date: DateTime
  author: OneToManyInput!
}

"""Comment(id, post, text, date, author)"""
input CommentFilter {
  id: IDBaseFilterLookup
  text: StrFilterLookup
  date: DatetimeDatetimeFilterLookup
  AND: CommentFilter
  OR: CommentFilter
  NOT: CommentFilter
  DISTINCT: Boolean
  authorUsername: StrFilterLookup
}

input CommentOrder @oneOf {
  date: Ordering
}

"""Comment(id, post, text, date, author)"""
input CommentUpdateInput {
  text: String
  date: DateTime
  author: OneToManyInput
}

"""Date with time (isoformat)"""
scalar DateTime

input DatetimeDatetimeFilterLookup {
  """Exact match. Filter will be skipped on `null` value"""
  exact: DateTime

  """Assignment test. Filter will be skipped on `null` value"""
  isNull: Boolean

  """
  Exact match of items in a given list. Filter will be skipped on `null` value
  """
  inList: [DateTime!]

  """Greater than. Filter will be skipped on `null` value"""
  gt: DateTime

  """Greater than or equal to. Filter will be skipped on `null` value"""
  gte: DateTime

  """Less than. Filter will be skipped on `null` value"""
  lt: DateTime

  """Less than or equal to. Filter will be skipped on `null` value"""
  lte: DateTime

  """Inclusive range test (between)"""
  range: DatetimeRangeLookup
  year: IntComparisonFilterLookup
  month: IntComparisonFilterLookup
  day: IntComparisonFilterLookup
  weekDay: IntComparisonFilterLookup
  isoWeekDay: IntComparisonFilterLookup
  week: IntComparisonFilterLookup
  isoYear: IntComparisonFilterLookup
  quarter: IntComparisonFilterLookup
  hour: IntComparisonFilterLookup
  minute: IntComparisonFilterLookup
  second: IntComparisonFilterLookup
  date: IntComparisonFilterLookup
  time: IntComparisonFilterLookup
}

input DatetimeRangeLookup {
  start: DateTime = null
  end: DateTime = null
}

input IDBaseFilterLookup {
  """Exact match. Filter will be skipped on `null` value"""
  exact: ID

  """Assignment test. Filter will be skipped on `null` value"""
  isNull: Boolean

  """
  Exact match of items in a given list. Filter will be skipped on `null` value
  """
  inList: [ID!]
}

input IntComparisonFilterLookup {
  """Exact match. Filter will be skipped on `null` value"""
  exact: Int

  """Assignment test. Filter will be skipped on `null` value"""
  isNull: Boolean

  """
  Exact match of items in a given list. Filter will be skipped on `null` value
  """
  inList: [Int!]

  """Greater than. Filter will be skipped on `null` value"""
  gt: Int

  """Greater than or equal to. Filter will be skipped on `null` value"""
  gte: Int

  """Less than. Filter will be skipped on `null` value"""
  lt: Int

  """Less than or equal to. Filter will be skipped on `null` value"""
  lte: Int

  """Inclusive range test (between)"""
  range: IntRangeLookup
}

input IntRangeLookup {
  start: Int = null
  end: Int = null
}

input ManyToManyInput {
  add: [ID!]
  remove: [ID!]
  set: [ID!]
}

type Mutation {
  createCategory(data: CategoryCreateInput!): Category!
  updateCategory(pk: ID!, data: CategoryUpdateInput!): Category!
  deleteCategory(pk: ID!): Category!
  createPost(data: PostCreateInput!): Post!
  updatePost(pk: ID!, data: PostUpdateInput!): Post!
  deletePost(pk: ID!): Post!
  createComment(data: CommentCreateInput!): Comment!
  updateComment(pk: ID!, data: CommentUpdateInput!): Comment!
  deleteComment(pk: ID!): Comment!
}

input OffsetPaginationInput {
  offset: Int! = 0
  limit: Int
}

input OneToManyInput {
  set: ID
}

enum Ordering {
  ASC
  ASC_NULLS_FIRST
  ASC_NULLS_LAST
  DESC
  DESC_NULLS_FIRST
  DESC_NULLS_LAST
}

"""Post(id, title, text, image, pubdate, author)"""
type Post {
  id: ID!
  title: String!
  text: String!
  pubdate: DateTime!
  author: User!
  categories(filters: CategoryFilter, ordering: [CategoryOrder!]! = []): [Category!]!
  comments(filters: CommentFilter, ordering: [CommentOrder!]! = []): [Comment!]!
  imageUrl: String
}

"""Post(id, title, text, image, pubdate, author)"""
input PostCreateInput {
  title: String!
  text: String!
  pubdate: DateTime
  author: UserPartialInput
  categories: ManyToManyInput
  image: Upload
}

"""Post(id, title, text, image, pubdate, author)"""
input PostFilter {
  id: IDBaseFilterLookup
  title: StrFilterLookup
  text: StrFilterLookup
  pubdate: DatetimeDatetimeFilterLookup
  AND: PostFilter
  OR: PostFilter
  NOT: PostFilter
  DISTINCT: Boolean
  search: String
  authorEmail: StrFilterLookup
}

input PostOrder @oneOf {
  title: Ordering
  text: Ordering
  pubdate: Ordering
}

"""Post(id, title, text, image, pubdate, author)"""
input PostUpdateInput {
  title: String
  text: String
  pubdate: DateTime
  author: UserPartialInput
  categories: ManyToManyInput
  image: Upload
}

type Query {
  version: String!
  me: User!
  user(pk: ID!): User!
  allUsers(filters: UserFilter, ordering: [UserOrder!]! = [], pagination: OffsetPaginationInput): [User!]!
  category(pk: ID!): Category!
  allCategories(filters: CategoryFilter, ordering: [CategoryOrder!]! = []): [Category!]!
  post(pk: ID!): Post!
  allPosts(filters: PostFilter, ordering: [PostOrder!]! = [], pagination: OffsetPaginationInput): [Post!]!
  comment(pk: ID!): Comment!
  allComments(filters: CommentFilter, ordering: [CommentOrder!]! = [], pagination: OffsetPaginationInput): [Comment!]!
}

input StrFilterLookup {
  """Exact match. Filter will be skipped on `null` value"""
  exact: String

  """Assignment test. Filter will be skipped on `null` value"""
  isNull: Boolean

  """
  Exact match of items in a given list. Filter will be skipped on `null` value
  """
  inList: [String!]

  """Case-insensitive exact match. Filter will be skipped on `null` value"""
  iExact: String

  """
  Case-sensitive containment test. Filter will be skipped on `null` value
  """
  contains: String

  """
  Case-insensitive containment test. Filter will be skipped on `null` value
  """
  iContains: String

  """Case-sensitive starts-with. Filter will be skipped on `null` value"""
  startsWith: String

  """Case-insensitive starts-with. Filter will be skipped on `null` value"""
  iStartsWith: String

  """Case-sensitive ends-with. Filter will be skipped on `null` value"""
  endsWith: String

  """Case-insensitive ends-with. Filter will be skipped on `null` value"""
  iEndsWith: String

  """
  Case-sensitive regular expression match. Filter will be skipped on `null` value
  """
  regex: String

  """
  Case-insensitive regular expression match. Filter will be skipped on `null` value
  """
  iRegex: String
}

"""Represents a file upload."""
scalar Upload

"""
User(id, password, last_login, is_superuser, username, first_name, last_name, email, is_staff, is_active, date_joined)
"""
type User {
  id: ID!

  """Required. 150 characters or fewer. Letters, digits and @/./+/-/_ only."""
  username: String!
  firstName: String!
  lastName: String!
  email: String!
  lastLogin: DateTime
  fullName: String!
  hasAlreadyBeenLoggedin: Boolean!
}

"""
User(id, password, last_login, is_superuser, username, first_name, last_name, email, is_staff, is_active, date_joined)
"""
input UserFilter {
  id: IDBaseFilterLookup

  """Required. 150 characters or fewer. Letters, digits and @/./+/-/_ only."""
  username: StrFilterLookup
  email: StrFilterLookup
  firstName: StrFilterLookup
  lastName: StrFilterLookup
  AND: UserFilter
  OR: UserFilter
  NOT: UserFilter
  DISTINCT: Boolean
  fullName: String
  partName: String
}

input UserOrder @oneOf {
  username: Ordering
  email: Ordering
  lastName: Ordering
  firstName: Ordering
}

"""
User(id, password, last_login, is_superuser, username, first_name, last_name, email, is_staff, is_active, date_joined)
"""
input UserPartialInput {
  id: ID

  """Required. 150 characters or fewer. Letters, digits and @/./+/-/_ only."""
  username: String
}
